services:
  - type: web
    name: nutria-backend
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: BACKEND_DATABASE_URL
        sync: false
      - key: BACKEND_JWT_SECRET
        sync: false
      - key: BACKEND_REFRESH_SECRET
        sync: false
      - key: BACKEND_OPEN_AI_API_KEY
        sync: false
      - key: BACKEND_NODE_ENV
        value: production
    healthCheckPath: /nutria/usuario
    autoDeploy: true

# # Optional: If you want to provision a PostgreSQL database via Render
# databases:
#   - name: nutria-postgres
#     databaseName: nutria
#     user: nutria_user
#     plan: free
#     region: oregon
